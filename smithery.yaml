startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      pagasaApiToken:
        type: string
        description: "PAGASA TenDay API token (optional). Without this, weather uses Open-Meteo."
    required: []
  commandFunction: |-
    (config) => ({
      command: "uvx",
      args: ["ph-civic-data-mcp"],
      env: {
        ...(config.pagasaApiToken && { PAGASA_API_TOKEN: config.pagasaApiToken }),
      }
    })
